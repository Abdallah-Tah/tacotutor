<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌮 TacoTutor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 12px 16px;
            text-align: center;
            border-bottom: 2px solid #0f3460;
        }
        .header h1 { font-size: 20px; }
        .header .subtitle { font-size: 12px; color: #aaa; }
        .setup {
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .setup.hidden { display: none; }
        .setup label { display: block; margin: 12px 0 4px; font-weight: 600; }
        .setup input, .setup select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
            background: #16213e; color: #eee; font-size: 16px;
        }
        .subject-grid {
            display: grid; grid-template-columns: 1fr; gap: 10px; margin: 16px 0;
        }
        .subject-card {
            padding: 16px; border-radius: 12px; background: #16213e;
            border: 2px solid #0f3460; cursor: pointer; text-align: center;
            transition: all 0.2s;
        }
        .subject-card:hover, .subject-card.selected {
            border-color: #e94560; background: #1a1a3e;
        }
        .subject-card .icon { font-size: 32px; }
        .subject-card .name { font-weight: 600; margin-top: 4px; }
        .subject-card .desc { font-size: 12px; color: #aaa; }
        .btn {
            padding: 14px 24px; border: none; border-radius: 10px; font-size: 16px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px;
        }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #c73651; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .chat.hidden { display: none; }
        .messages {
            flex: 1; overflow-y: auto; padding: 16px; display: flex;
            flex-direction: column; gap: 10px;
        }
        .msg {
            max-width: 80%; padding: 10px 14px; border-radius: 16px;
            font-size: 15px; line-height: 1.4; word-wrap: break-word;
        }
        .msg.tutor {
            background: #0f3460; align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg.student {
            background: #e94560; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg .audio-btn {
            display: inline-block; margin-top: 6px; padding: 4px 10px;
            background: rgba(255,255,255,0.15); border-radius: 20px;
            font-size: 12px; cursor: pointer;
        }
        .input-bar {
            display: flex; padding: 10px; gap: 8px; background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .input-bar input {
            flex: 1; padding: 12px; border-radius: 24px; border: 1px solid #333;
            background: #1a1a2e; color: #eee; font-size: 16px;
        }
        .input-bar button {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: #e94560; color: #fff; font-size: 18px; cursor: pointer;
        }
        .status {
            text-align: center; padding: 4px; font-size: 12px; color: #888;
            background: #16213e;
        }
        .recording { background: #e94560 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<!-- Setup Screen -->
<div class="setup" id="setup">
    <div class="header" style="margin: -20px -20px 20px; padding: 20px;">
        <h1>🌮 TacoTutor</h1>
        <div class="subtitle">AI Voice Tutor for Kids</div>
    </div>

    <label>Child's Name</label>
    <input type="text" id="childName" placeholder="Enter name..." value="">

    <label>Pick a Subject</label>
    <div class="subject-grid" id="subjects"></div>

    <button class="btn btn-primary" onclick="startSession()">Start Learning! 🚀</button>
</div>

<!-- Chat Screen -->
<div class="chat hidden" id="chatView">
    <div class="header">
        <h1 id="chatTitle">🌮 TacoTutor</h1>
        <div class="subtitle" id="chatSubtitle"></div>
    </div>
    <div class="status" id="status">Ready</div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Type or tap 🎤 to speak..."
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button id="micBtn" onclick="toggleMic()">🎤</button>
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
let selectedSubject = 'quran';
let childName = 'student';
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

// Load subjects
fetch('/api/subjects').then(r=>r.json()).then(data => {
    const grid = document.getElementById('subjects');
    data.subjects.forEach(s => {
        const card = document.createElement('div');
        card.className = 'subject-card' + (s.id === selectedSubject ? ' selected' : '');
        card.innerHTML = `<div class="icon">${s.name.split(' ')[0]}</div><div class="name">${s.name.split(' ').slice(1).join(' ')}</div><div class="desc">${s.desc}</div>`;
        card.onclick = () => {
            document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedSubject = s.id;
        };
        grid.appendChild(card);
    });
});

async function startSession() {
    childName = document.getElementById('childName').value.trim() || 'student';
    const resp = await fetch('/api/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({child: childName, subject: selectedSubject})
    });
    const data = await resp.json();

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('chatView').classList.remove('hidden');
    document.getElementById('chatTitle').textContent = `🌮 ${data.level_name}`;
    document.getElementById('chatSubtitle').textContent = `${childName} — Level ${data.level}`;

    // Get initial greeting
    sendMessage('Hello! I\'m ready to learn.');
}

async function sendMessage(text) {
    const input = document.getElementById('msgInput');
    const msg = text || input.value.trim();
    if (!msg) return;
    input.value = '';

    addMessage(msg, 'student');
    setStatus('Thinking...');

    const lang = selectedSubject === 'quran' ? 'ar' : 'en';
    const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({child: childName, subject: selectedSubject, message: msg, language: lang})
    });
    const data = await resp.json();

    setStatus('Ready');
    if (data.reply) {
        addMessage(data.reply, 'tutor', data.audio);
    }
}

function addMessage(text, type, audioUrl) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    let html = text.replace(/\n/g, '<br>');
    if (audioUrl) {
        html += `<br><span class="audio-btn" onclick="playAudio('${audioUrl}')">🔊 Play</span>`;
    }
    div.innerHTML = html;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({behavior: 'smooth'});

    // Auto-play audio
    if (audioUrl) playAudio(audioUrl);
}

function playAudio(url) {
    const audio = new Audio(url);
    audio.play().catch(() => {});
}

function setStatus(text) {
    document.getElementById('status').textContent = text;
}

// Microphone support
async function toggleMic() {
    const btn = document.getElementById('micBtn');
    if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        btn.classList.remove('recording');
        btn.textContent = '🎤';
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, {type: 'audio/webm'});
            // Simple: send via Web Speech API instead
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        isRecording = true;
        btn.classList.add('recording');
        btn.textContent = '⏹';

        // Use browser's speech recognition for simplicity
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = selectedSubject === 'quran' ? 'ar-SA' : 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                sendMessage(transcript);
                if (isRecording) toggleMic();
            };
            recognition.onerror = () => { if (isRecording) toggleMic(); };
            recognition.onend = () => { if (isRecording) toggleMic(); };
            recognition.start();
        }
    } catch(e) {
        alert('Microphone not available. Use text input.');
    }
}
</script>
</body>
</html>
