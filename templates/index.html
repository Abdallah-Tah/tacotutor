<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Language" content="en-US">
    <meta name="google" content="notranslate">
    <title>TacoTutor — AI Tutor for Kids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --secondary: #FF6B6B;
            --accent: #4ECDC4;
            --bg-dark: #0B0B1A;
            --bg-card: #141428;
            --bg-card-hover: #1A1A35;
            --bg-input: #1E1E3A;
            --text: #E8E8F0;
            --text-muted: #8888AA;
            --text-dim: #555577;
            --border: #2A2A4A;
            --success: #4ADE80;
            --warning: #FBBF24;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Nunito', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* ─── App Shell ─── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        /* ─── Header ─── */
        .app-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            min-height: 56px;
        }
        .app-header .back-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: var(--text);
            font-size: 20px; cursor: pointer; border-radius: 50%;
            transition: background 0.2s;
        }
        .app-header .back-btn:hover { background: var(--bg-card-hover); }
        .app-header .header-info { flex: 1; margin-left: 8px; }
        .app-header .header-info h1 { font-size: 16px; font-weight: 800; }
        .app-header .header-info p { font-size: 11px; color: var(--text-muted); }
        .app-header .level-badge {
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            background: var(--primary); color: #fff;
        }

        /* ─── Views ─── */
        .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .view.active { display: flex; }

        /* ─── Welcome Screen ─── */
        .welcome {
            justify-content: center;
            align-items: center;
            padding: 32px 24px;
            text-align: center;
        }
        .welcome .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(108,99,255,0.3);
        }
        .welcome h2 {
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .welcome .tagline { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

        .form-group { width: 100%; max-width: 340px; margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 14px 16px;
            background: var(--bg-input); border: 2px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 16px; font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-input::placeholder { color: var(--text-dim); }

        /* ─── Subject Cards ─── */
        .subjects-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; width: 100%; max-width: 340px;
            margin-bottom: 24px;
        }
        .subject-card {
            padding: 14px 8px; border-radius: var(--radius);
            background: var(--bg-card); border: 2px solid var(--border);
            cursor: pointer; text-align: center;
            transition: all 0.2s ease;
        }
        .subject-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
        .subject-card.selected {
            border-color: var(--primary);
            background: rgba(108,99,255,0.1);
            box-shadow: 0 0 20px rgba(108,99,255,0.15);
        }
        .subject-card .icon { font-size: 28px; display: block; margin-bottom: 4px; }
        .subject-card .label { font-size: 11px; font-weight: 700; color: var(--text-muted); }

        .btn-start {
            width: 100%; max-width: 340px;
            padding: 16px; border: none; border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; font-size: 16px; font-weight: 800;
            font-family: inherit; cursor: pointer;
            box-shadow: 0 4px 16px rgba(108,99,255,0.4);
            transition: all 0.2s;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(108,99,255,0.5); }
        .btn-start:active { transform: translateY(0); }

        /* ─── Chat ─── */
        .messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message-row {
            display: flex; gap: 8px;
            animation: msgIn 0.3s ease-out;
        }
        .message-row.tutor { align-self: flex-start; max-width: 85%; }
        .message-row.student { align-self: flex-end; max-width: 85%; flex-direction: row-reverse; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .tutor .avatar { background: linear-gradient(135deg, var(--primary), var(--accent)); }
        .student .avatar { background: linear-gradient(135deg, var(--secondary), #FF8E8E); }

        .bubble {
            padding: 12px 16px; border-radius: var(--radius);
            font-size: 15px; line-height: 1.5; word-wrap: break-word;
        }
        .tutor .bubble {
            background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }
        .student .bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .audio-player {
            display: flex; align-items: center; gap: 8px;
            margin-top: 8px; padding: 6px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px; cursor: pointer;
            transition: background 0.2s;
        }
        .audio-player:hover { background: rgba(255,255,255,0.15); }
        .audio-player .play-icon { font-size: 14px; }
        .audio-player .wave { display: flex; gap: 2px; align-items: center; height: 16px; }
        .audio-player .wave span {
            width: 3px; background: var(--accent);
            border-radius: 2px; animation: wave 1.2s ease-in-out infinite;
        }
        .audio-player .wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .audio-player .wave span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
        .audio-player .wave span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
        .audio-player .wave span:nth-child(4) { height: 14px; animation-delay: 0.45s; }
        .audio-player .wave span:nth-child(5) { height: 6px; animation-delay: 0.6s; }
        .audio-player.playing .wave span { animation: wavePlay 0.6s ease-in-out infinite; }
        .audio-player .duration { font-size: 11px; color: var(--text-muted); }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        @keyframes wavePlay {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.4); }
        }

        /* ─── Typing Indicator ─── */
        .typing {
            display: none; align-self: flex-start;
            padding: 12px 20px; background: var(--bg-card);
            border-radius: var(--radius); border-bottom-left-radius: 4px;
        }
        .typing.active { display: flex; gap: 4px; align-items: center; }
        .typing span {
            width: 8px; height: 8px; background: var(--text-muted);
            border-radius: 50%; animation: bounce 1.4s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* ─── Input Bar ─── */
        .input-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            safe-area-inset-bottom: env(safe-area-inset-bottom);
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        }
        .input-field {
            flex: 1; padding: 12px 16px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 24px; color: var(--text);
            font-size: 15px; font-family: inherit;
            transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: var(--primary); }
        .input-field::placeholder { color: var(--text-dim); }

        .btn-icon {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            border: none; border-radius: 50%;
            font-size: 18px; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0;
        }
        .btn-mic {
            background: var(--bg-input); color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-mic.recording {
            background: var(--secondary); color: #fff;
            border-color: var(--secondary);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .btn-send {
            background: var(--primary); color: #fff;
            box-shadow: 0 2px 8px rgba(108,99,255,0.3);
        }
        .btn-send:hover { background: var(--primary-dark); }
        .btn-send:disabled { opacity: 0.4; cursor: default; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255,107,107,0); }
        }

        /* ─── Loading Overlay ─── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(11,11,26,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 100;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Responsive ─── */
        @media (min-width: 481px) {
            .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ═══ Welcome View ═══ -->
    <div class="view active" id="welcomeView">
        <div class="welcome">
            <div class="logo">🌮</div>
            <h2>TacoTutor</h2>
            <p class="tagline">AI-powered learning for kids</p>

            <div class="form-group">
                <label>Child's Name</label>
                <input type="text" class="form-input" id="childName"
                       placeholder="What's your name?" maxlength="20" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Choose Subject</label>
                <div class="subjects-grid">
                    <div class="subject-card selected" data-subject="quran">
                        <span class="icon">🕌</span>
                        <span class="label">Quran</span>
                    </div>
                    <div class="subject-card" data-subject="english">
                        <span class="icon">📖</span>
                        <span class="label">English</span>
                    </div>
                    <div class="subject-card" data-subject="math">
                        <span class="icon">🔢</span>
                        <span class="label">Math</span>
                    </div>
                </div>
            </div>

            <button class="btn-start" id="startBtn" onclick="startSession()">
                Let's Learn! 🚀
            </button>
        </div>
    </div>

    <!-- ═══ Chat View ═══ -->
    <div class="view" id="chatView">
        <div class="app-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-info">
                <h1 id="chatTitle">🌮 Quran</h1>
                <p id="chatSubtitle">Level 1</p>
            </div>
            <div class="level-badge" id="levelBadge">LVL 1</div>
        </div>

        <div class="messages" id="messages">
            <div class="typing" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="input-bar">
            <input type="text" class="input-field" id="msgInput"
                   placeholder="Type your answer..."
                   autocomplete="off"
                   onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage()">
            <button class="btn-icon btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-icon btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
</div>

<script>
// ─── State ───
let state = {
    child: 'student',
    subject: 'quran',
    level: 1,
    sending: false,
    recording: false,
    recognition: null,
};

const SUBJECT_META = {
    quran: { icon: '🕌', name: 'Quran & Arabic', lang: 'ar-SA' },
    english: { icon: '📖', name: 'English', lang: 'en-US' },
    math: { icon: '🔢', name: 'Math', lang: 'en-US' },
};

// ─── Subject Selection ───
document.querySelectorAll('.subject-card').forEach(card => {
    card.addEventListener('click', () => {
        console.log('Subject card clicked:', card.dataset.subject);
        document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        state.subject = card.dataset.subject;
    });
});

// ─── Start Session ───
function startSession() {
    console.log('startSession called');
    const name = document.getElementById('childName').value.trim();
    console.log('Name entered:', name);
    
    const btn = document.getElementById('startBtn');
    console.log('Button element:', btn);
    console.log('Button onclick:', btn.getAttribute('onclick'));
    
    if (!name) {
        console.log('No name provided');
        document.getElementById('childName').focus();
        document.getElementById('childName').style.borderColor = 'var(--secondary)';
        alert('Please enter your name!');
        return;
    }
    
    if (state.sending) {
        console.log('Already sending, ignoring click');
        return;
    }
    
    state.child = name;
    showLoading(true);
    
    const meta = SUBJECT_META[state.subject];
    console.log('Starting session for:', name, 'subject:', state.subject);
    
    switchView('chatView');
    
    // Get initial greeting
    _send('Hello! I\'m ready to learn today!');
}

// ─── Send Message ───
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || state.sending) return;
    input.value = '';
    await _send(text);
}

async function _send(text) {
    state.sending = true;
    addMessage(text, 'student');
    showTyping(true);

    try {
        const lang = state.subject === 'quran' ? 'ar' : 'en';
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                child: state.child,
                subject: state.subject,
                message: text,
                language: lang,
            }),
        });
        const data = await resp.json();
        if (!resp.ok) {
            addMessage('Oops, something went wrong. Try again!', 'tutor');
        } else if (data.reply) {
            addMessage(data.reply, 'tutor', data.audio);
        } else {
            addMessage('Oops, no reply received. Try again!', 'tutor');
        }
        showTyping(false);
        state.sending = false;
    }
}

// ─── Message Rendering ───
function addMessage(text, type, audioUrl) {
    const container = document.getElementById('messages');
    const typing = document.getElementById('typingIndicator');

    const row = document.createElement('div');
    row.className = `message-row ${type}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = type === 'tutor' ? '🌮' : '👶';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

    if (audioUrl) {
        const player = document.createElement('div');
        player.className = 'audio-player';
        player.innerHTML = `
            <span class="play-icon">▶️</span>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
            <span class="duration">0:00</span>
        `;
        player.onclick = () => playAudio(audioUrl, player);
        bubble.appendChild(player);
        // Auto-play
        setTimeout(() => playAudio(audioUrl, player), 300);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    container.insertBefore(row, typing);
    scrollToBottom();
}

function playAudio(url, player) {
    // Stop any other playing audio
    document.querySelectorAll('.audio-player.playing').forEach(p => {
        p.classList.remove('playing');
        p.querySelector('.play-icon').textContent = '▶️';
    });

    const audio = new Audio(url);
    player.classList.add('playing');
    player.querySelector('.play-icon').textContent = '🔊';

    audio.play().catch(() => {});
    audio.onended = () => {
        player.classList.remove('playing');
        player.querySelector('.play-icon').textContent = '▶️';
    };
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function scrollToBottom() {
    const msgs = document.getElementById('messages');
    setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
}

function showTyping(show) {
    document.getElementById('typingIndicator').classList.toggle('active', show);
    if (show) scrollToBottom();
}

function showLoading(show) {
    document.getElementById('loading').classList.toggle('active', show);
}

function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
}

function goBack() {
    if (state.recording) toggleMic();
    switchView('welcomeView');
}

// ─── Voice Input ───
function toggleMic() {
    const btn = document.getElementById('micBtn');
    if (state.recording) {
        state.recording = false;
        btn.classList.remove('recording');
        btn.textContent = '🎤';
        if (state.recognition) { state.recognition.stop(); state.recognition = null; }
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Voice input not supported. Use text.');
        return;
    }

    const meta = SUBJECT_META[state.subject];
    const recognition = new SpeechRecognition();
    recognition.lang = meta.lang;
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        if (state.recording) toggleMic();
        if (transcript.trim()) _send(transcript.trim());
    };
    recognition.onerror = () => { if (state.recording) toggleMic(); };
    recognition.onend = () => { if (state.recording) toggleMic(); };

    state.recognition = recognition;
    state.recording = true;
    btn.classList.add('recording');
    btn.textContent = '⏹';
    recognition.start();
}

// Focus input on chat view
document.getElementById('msgInput').addEventListener('focus', () => {
    setTimeout(scrollToBottom, 300);
});
</script>
</body>
</html>
